<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krittika First Website</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="folder">

    <div class="folder-tab">krittika.first.website</div>

    <div class="archive-label">ARCHIVE 001</div>

    <section class="hero">
      <h1>Hello, World!</h1>
      <p class="intro">This is my first Git repository created with GitHub Desktop.</p>
      <p class="intro">Welcome to version control!</p>
    </section>

    <img class="asset film" src="images/film.png" alt="film strip">
    <img class="asset polaroid" src="images/polaroid.png" alt="black and white photo">
    <img class="asset stamp" src="images/stamp.png" alt="postage stamp">
    <img class="asset skyline" src="images/skyline.png" alt="film photograph">

    <section class="note">
      <h2>notes.txt</h2>
      <p>film photos</p>
      <p>small archives</p>
      <p>objects I collect</p>
    </section>

    <section class="files">
      <p>▧ film photos</p>
      <p>▧ studio</p>
      <p>▧ sketchbook</p>
      <p>▧ inspiration</p>
    </section>

    <section class="status">
      <p>WORK IN PROGRESS</p>
      <span>please wait...</span>
    </section>

  </main>
</body>
</html>
